name: Deploy

on:
  push:
    branches:
      - production

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.14.4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install SSH key
        uses: shimataro/ssh-key-action@v2
        with:
          key: ${{ secrets.SSH_KEY }}
          known_hosts: unnecessary

      - name: Add known hosts
        run: ssh-keyscan -H ${{ secrets.SSH_HOST }} >> ~/.ssh/known_hosts 2>/dev/null

      - name: Configure git for private deps
        run: |
          echo "https://x-access-token:${{ secrets.GH_TOKEN }}@github.com" > ~/.git-credentials
          git config --global credential.helper store
          git config --global url."https://github.com/".insteadOf "git@github.com:"
          git config --global url."https://github.com/".insteadOf "ssh://git@github.com/"
          git config --global url."https://github.com/".insteadOf "git+ssh://git@github.com/"

      - name: Resolve providers
        id: providers
        run: |
          PROVIDERS_SHA=$(git ls-remote https://github.com/xp-technologies-dev/private-providers.git main | awk '{print $1}')
          if [ -z "$PROVIDERS_SHA" ]; then echo "Failed to resolve providers" && exit 1; fi
          echo "sha=$PROVIDERS_SHA" >> $GITHUB_OUTPUT

      - name: Update package.json with providers
        run: |
          node -e "
            const fs = require('fs');
            const pkg = JSON.parse(fs.readFileSync('package.json', 'utf8'));
            pkg.dependencies['@p-stream/providers'] = 'https://github.com/xp-technologies-dev/private-providers.git#${{ steps.providers.outputs.sha }}';
            fs.writeFileSync('package.json', JSON.stringify(pkg, null, 2) + '\n');
          "

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Build
        run: pnpm build

      - name: Clean credentials
        if: always()
        run: |
          rm -f ~/.git-credentials
          git config --global --unset credential.helper || true

      - name: Deploy to VPS
        run: |
          rsync -avz --delete dist/ ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}:~/p-stream/dist/
          ssh ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }} "echo '${{ steps.providers.outputs.sha }}' > ~/p-stream/.providers-sha"
